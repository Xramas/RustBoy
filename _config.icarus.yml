# ============================================================
# Icarus 主题配置文件
# 文档：https://ppoffice.github.io/hexo-theme-icarus/
# ============================================================

# 配置文件版本号（用于自动迁移，勿手动修改）
version: 5.1.0
# 主题风格：default（默认风格）/ cyberpunk（赛博朋克风格）
variant: default
# 站点 Logo 的路径或 URL
logo: /img/logo.svg

# --------------- 页面元信息配置 ---------------
head:
    # 站点图标的路径或 URL
    favicon: /img/favicon.svg

    # Web 应用清单（PWA）配置
    # 参考：https://developer.mozilla.org/en-US/docs/Web/Manifest
    manifest:
        # Web 应用名称（默认使用站点标题）
        name: RustBoy
        # 空间不足时显示的简短名称
        short_name: RustBoy
        # 应用启动 URL
        start_url:
        # 应用默认主题颜色
        theme_color:
        # 样式表加载前的占位背景色
        background_color:
        # 显示模式：standalone / fullscreen / minimal-ui / browser
        display: standalone
        # 应用图标列表
        icons:
            -
                # 图标文件路径
                src: ''
                # 图标尺寸，空格分隔的宽高（如 "192x192"）
                sizes: ''
                # 图标的 MIME 类型（如 "image/png"）
                type:

    # Open Graph 社交分享元数据
    # 参考：https://hexo.io/docs/helpers.html#open-graph
    open_graph:
        # 页面标题（og:title），通常留空由页面自动生成
        title:
        # 页面类型（og:type），通常留空由页面自动生成
        type: blog
        # 页面 URL（og:url），通常留空由页面自动生成
        url:
        # 页面封面图（og:image），通常留空由页面自动生成
        image:
        # 站点名称（og:site_name），通常留空由页面自动生成
        site_name:
        # 文章作者（article:author），通常留空由页面自动生成
        author:
        # 页面描述（og:description），通常留空由页面自动生成
        description:
        # Twitter 卡片类型（twitter:card）
        twitter_card:
        # Twitter 作者 ID（twitter:creator）
        twitter_id:
        # Twitter 站点 ID（twitter:site）
        twitter_site:
        # Google+ 个人主页链接（已弃用）
        google_plus:
        # Facebook 管理员 ID（fb:admins）
        fb_admins:
        # Facebook 应用 ID（fb:app_id）
        fb_app_id:

    # 结构化数据（Schema.org）配置
    # 参考：https://developers.google.com/search/docs/guides/intro-structured-data
    structured_data:
        # 页面标题，通常留空由页面自动生成
        title:
        # 页面描述，通常留空由页面自动生成
        description:
        # 页面 URL，通常留空由页面自动生成
        url:
        # 文章作者，通常留空由页面自动生成
        author:
        # 发布者名称，通常留空由页面自动生成
        publisher:
        # 发布者 Logo，通常留空由页面自动生成
        publisher_logo:
        # 页面图片，通常留空由页面自动生成
        image:

    # 额外的 HTML meta 标签列表
    # 格式为 <属性>=<值>，多个属性用分号分隔
    # 示例：name=theme-color;content=#123456 => <meta name="theme-color" content="#123456">
    meta:
        - name=theme-color;content=#263238

    # RSS 订阅源的路径或 URL
    rss: /atom.xml

# --------------- 导航栏配置 ---------------
navbar:
    # 导航菜单项（显示文本: 链接路径）
    menu:
        首页: /
        归档: /archives
        分类: /categories
        标签: /tags
        关于: /about
    # 导航栏右侧链接
    links:
        Blog Source:
            # 图标（FontAwesome 类名）
            icon: fab fa-github
            # 链接地址
            url: https://github.com/Xramas/RustBoy

# --------------- 页脚配置 ---------------
footer:
    # 版权信息文本
    copyright: '&copy; 2026 <a href="https://rustboy.de">RustBoy</a>. All rights reserved.'
    # 页脚右侧链接
    links:
        Creative Commons:
            icon: fab fa-creative-commons
            url: https://creativecommons.org/
        Attribution 4.0 International:
            icon: fab fa-creative-commons-by
            url: https://creativecommons.org/licenses/by/4.0/
        Download on GitHub:
            icon: fab fa-github
            url: https://github.com/ppoffice/hexo-theme-icarus

# --------------- 文章设置 ---------------
article:
    # 代码高亮设置
    highlight:
        # 代码高亮主题
        # 可选值：https://github.com/highlightjs/highlight.js/tree/master/src/styles
        theme: atom-one-light
        # 是否显示代码复制按钮
        clipboard: true
        # 代码块默认折叠状态：""（不折叠）/ "folded"（折叠）/ "unfolded"（展开）
        fold: unfolded
    # 是否显示预计阅读时间
    readtime: true
    # 是否显示更新时间。设为 true 时，仅当 page.updated 存在且与 page.date 不同时才显示
    update_time: true
    # 文章版权许可声明
    licenses:
        Creative Commons:
            icon: fab fa-creative-commons
            url: https://creativecommons.org/
        Attribution:
            icon: fab fa-creative-commons-by
            url: https://creativecommons.org/licenses/by/4.0/
        Noncommercial:
            icon: fab fa-creative-commons-nc
            url: https://creativecommons.org/licenses/by-nc/4.0/

# --------------- 搜索插件配置 ---------------
# 参考：https://ppoffice.github.io/hexo-theme-icarus/categories/Plugins/Search/
search:
    # 搜索引擎类型：insight / google / baidu / algolia
    type: insight
    # 是否在搜索结果中包含页面
    index_pages: true

# --------------- 评论插件配置 ---------------
# 参考：https://ppoffice.github.io/hexo-theme-icarus/categories/Plugins/Comment/
comment:
    # 评论系统类型：disqus / changyan / gitalk / livere / valine
    type: disqus
    # Disqus 站点简称（需要填写才能启用）
    shortname: ''

# --------------- 打赏插件配置 ---------------
# 参考：https://ppoffice.github.io/hexo-theme-icarus/categories/Plugins/Donation/
donates:
    # 爱发电打赏按钮
    -
        type: afdian
        # 爱发电个人页面 URL
        url: ''
    # 支付宝打赏按钮
    -
        type: alipay
        # 支付宝收款二维码图片 URL
        qrcode: ''
    # "Buy me a coffee" 打赏按钮
    -
        type: buymeacoffee
        # "Buy me a coffee" 页面 URL
        url: ''
    # Patreon 打赏按钮
    -
        type: patreon
        # Patreon 页面 URL
        url: ''
    # PayPal 打赏按钮
    -
        type: paypal
        # PayPal 商户 ID 或邮箱地址
        business: ''
        # 货币代码（如 USD、EUR）
        currency_code: USD
    # 微信打赏按钮
    -
        type: wechat
        # 微信收款二维码图片 URL
        qrcode: ''

# --------------- 分享插件配置 ---------------
# 参考：https://ppoffice.github.io/hexo-theme-icarus/categories/Plugins/Share/
share:
    # 分享服务类型：sharethis / addtoany
    type: sharethis
    # ShareThis 分享插件脚本 URL（需要填写才能启用）
    install_url: ''

# --------------- 侧边栏配置 ---------------
# 注意：侧边栏仅在包含至少一个小部件时才可见
sidebar:
    # 左侧边栏配置
    left:
        # 页面滚动时是否固定在顶部
        sticky: false
    # 右侧边栏配置
    right:
        # 页面滚动时是否固定在顶部
        sticky: false

# --------------- 侧边栏小部件配置 ---------------
# 参考：https://ppoffice.github.io/hexo-theme-icarus/categories/Widgets/
widgets:
    # 个人信息小部件
    -
        # 小部件位置：left（左侧边栏）/ right（右侧边栏）
        position: left
        type: profile
        # 作者名称
        author: RustBoy
        # 作者头衔
        author_title: Rust Learner
        # 作者所在地
        location: ''
        # 头像图片的路径或 URL
        avatar:
        # 是否显示圆形头像
        avatar_rounded: true
        # Gravatar 邮箱地址（与头像二选一）
        gravatar:
        # 关注按钮的链接
        follow_link: https://github.com/Xramas
        # 底部社交链接
        social_links:
            Github:
                icon: fab fa-github
                url: https://github.com/Xramas
            RSS:
                icon: fas fa-rss
                url: /atom.xml

    # 文章目录小部件
    -
        position: left
        type: toc
        # 是否显示各级标题的编号索引
        index: true
        # 不可见的子标题是否自动折叠
        collapsed: true
        # 显示的最大标题层级（1-6）
        depth: 3

    # 友情链接小部件
    -
        position: left
        type: links
        # 友情链接站点列表（名称: URL）
        links:
            Claude: https://claude.ai
            Cloudflare: https://cloudflare.com
            GitHub: https://github.com
            Google: https://google.com
            Microsoft: https://microsoft.com
            Xiaomi: https://mi.com

    # 分类小部件
    -
        position: left
        type: categories

    # 最近文章小部件
    -
        position: left
        type: recent_posts

    # 归档小部件
    -
        position: left
        type: archives

    # 标签小部件
    -
        position: left
        type: tags
        # 排序方式：name（按名称升序）/ -length（按文章数降序）
        order_by: name
        # 显示标签数量，留空则显示全部
        amount:
        # 是否显示标签下的文章数
        show_count: true

    # Google FeedBurner 邮件订阅小部件
    -
        position: left
        type: subscribe_email
        # 输入框下方的提示文字
        description:
        # Feedburner ID
        feedburner_id: ''

    # Google AdSense 广告小部件
    -
        position: left
        type: adsense
        # AdSense 客户端 ID
        client_id: ''
        # AdSense 广告单元 ID
        slot_id: ''

    # Follow.it 邮件订阅小部件
    -
        position: left
        type: followit
        # 输入框下方的提示文字
        description:
        # 订阅表单的提交 URL
        action_url: ''
        # Feed 认证验证码
        verification_code: ''

# --------------- 插件配置 ---------------
# 参考：https://ppoffice.github.io/hexo-theme-icarus/categories/Plugins/
plugins:
    # 是否启用页面启动动画（anime.js）
    animejs: true
    # 是否显示"返回顶部"按钮
    back_to_top: true

    # 百度统计配置
    # 参考：https://tongji.baidu.com
    baidu_analytics:
        # 百度统计跟踪 ID
        tracking_id:

    # Bing 站长工具配置
    # 参考：https://www.bing.com/toolbox/webmaster/
    bing_webmaster:
        # Bing 站长工具验证 meta 标签中的 tracking ID
        tracking_id:

    # 不蒜子网站/页面访问计数器
    # 参考：https://busuanzi.ibruce.info
    busuanzi: false

    # CNZZ 统计配置
    # 参考：https://www.umeng.com/web
    cnzz:
        # CNZZ 跟踪器 ID
        id:
        # CNZZ 网站 ID
        web_id:

    # Cookie 同意提示配置
    # 参考：https://www.osano.com/cookieconsent/
    cookie_consent:
        # 合规类型：info（告知）/ opt-in（需同意）/ opt-out（可退出）
        type: info
        # 弹窗样式：block（块状）/ edgeless（无边框）/ classic（经典）
        theme: edgeless
        # 弹窗是否固定在屏幕上（不随页面滚动）
        static: false
        # 弹窗显示位置：bottom-left / bottom-right / top-left / top-right
        position: bottom-left
        # 站点 Cookie 政策页面的 URL
        policyLink: https://www.cookiesandyou.com/

    # 是否启用 lightGallery 图片画廊和 Justified Gallery
    gallery: true

    # Google Analytics 配置
    # 参考：https://analytics.google.com
    google_analytics:
        # Google Analytics 跟踪 ID
        tracking_id:

    # Hotjar 用户行为分析配置
    # 参考：https://www.hotjar.com/
    hotjar:
        # Hotjar 站点 ID
        site_id:

    # 是否启用 KaTeX 数学公式排版
    # 参考：https://katex.org/
    katex: false

    # 是否启用 MathJax 数学公式排版
    # 参考：https://www.mathjax.org/
    mathjax: false

    # 是否启用过时浏览器检测提示
    # 参考：http://outdatedbrowser.com/
    outdated_browser: false

    # 是否启用 PJAX 无刷新加载
    pjax: true

    # 是否在页面顶部显示加载进度条
    progressbar: true

    # Statcounter 统计配置
    # 参考：https://statcounter.com/
    statcounter:
        # Statcounter 项目 ID
        project:
        # Statcounter 项目安全码
        security:

    # Twitter 转化跟踪配置
    # 参考：https://business.twitter.com/en/help/campaign-measurement-and-analytics/conversion-tracking-for-websites.html
    twitter_conversion_tracking:
        # Twitter Pixel ID
        pixel_id:

# --------------- CDN 资源路径配置 ---------------
# 参考：https://ppoffice.github.io/hexo-theme-icarus/Configuration/Theme/speed-up-your-site-with-custom-cdn/
providers:
    # JS/CSS 库的 CDN 路径模板（${package}、${version}、${filename} 会被自动替换）
    cdn: '/lib/${package}@${version}/${filename}'
    # 字体 CSS 文件路径
    fontcdn: '/lib/fonts/fonts.css'
    # 图标字体 CSS 文件路径
    iconcdn: '/lib/fontawesome/all.css'
