title: RustBoy
subtitle: My RUST Note
description: 'RustBoy的Rust学习笔记，记录Rust学习过程中的一些知识点和经验分享。'
keywords: Rust, RustBoy, Rust Note, Rust学习笔记
author: RustBoy
language: zh-CN
timezone: 'Asia/Shanghai'
url: https://rustboy.de
permalink: ':title.html'
permalink_defaults: null
pretty_urls:
  trailing_index: true
  trailing_html: true
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: ':lang'
skip_render: null
new_post_name: ':title.md'
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: 'rustboy.de'
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: false
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: true
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''
index_generator:
  path: ''
  per_page: 10
  order_by: '-date'
default_category: uncategorized
category_map: null
tag_map: null
meta_generator: false
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime
per_page: 10
pagination_dir: page
include: null
exclude: null
ignore: null
theme: icarus

# SEO
sitemap:
  path: sitemap.xml
feed:
  enable: true
  type: atom
  path: atom.xml
  limit: 20

# hexo-neat 自动静态资源压缩配置
neat_enable: true

# HTML 压缩
neat_html:
  enable: true
  exclude: []

# CSS 压缩
neat_css:
  enable: true
  exclude:
    - '**/*.min.css' # 排除本身已经压缩过的第三方 CSS

# JS 压缩
neat_js:
  enable: true
  mangle: true
  compress: true
  exclude:
    - '**/*.min.js'  # 排除已经压缩过的第三方 JS

